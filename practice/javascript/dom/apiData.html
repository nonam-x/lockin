<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data From Api</title>
  </head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .main {
      display: flex;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: red;
    }

    #input {
        flex: 2;
        margin-right: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }

    #btn {
      padding: 10px 15px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #btn:hover {
      background: #4338ca;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    li:hover {
      background: #f9f9f9;
    }
  </style>
  <body>
    <div class="container">
      <h2>Todo List</h2>
      <div class="main"><input type="text" id="input" />
        <button id="btn">Add</button>
    </div>
      <div>
        <ul id="todoContain"></ul>
      </div>
    </div>

    <script>
      const inputRef = document.getElementById("input");
      const btnRef = document.getElementById("btn");
      const ulRef = document.getElementById("todoContain");

      //   (async () => {
      //     fetch("https://api.freeapi.app/api/v1/todos", { method: "GET" })
      //       .then((response) => response.json())
      //       .then((data) => {
      //         for (const obj of data.data) {
      //           const li = document.createElement("li");
      //           li.innerText = obj.description;
      //           ulRef.appendChild(li);
      //         }
      //       });
      //   })();

      btnRef.addEventListener("click", () => {
        value = inputRef.value;
        const li = document.createElement("li");
        li.innerText = value;
        ulRef.appendChild(li);
        inputRef.innerText = ""
        li.addEventListener("click", () => {
          li.remove();
        });
      });
    </script>
  </body>
</html>
